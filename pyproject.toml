[project]
name = "ppg-to-motion"
version = "0.1.0"
description = "Dataset builder for PPG motion datasets (IEEE DSP Cup and PPG-DaLiA)"
requires-python = ">=3.10"
dependencies = [
    "numpy>=1.26",
    "pandas>=2.2",
    "scipy>=1.13",
    "tqdm>=4.66",
    "matplotlib>=3.8",
    "ipykernel>=6.29",
]

[build-system]
requires = ["setuptools>=42"]
build-backend = "setuptools.build_meta"

[tool.setuptools.packages.find]
where = ["src"]
